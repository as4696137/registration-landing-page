services:
  - type: web
    name: registration-landing-page-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: APP_NAME
        value: Registration Landing Page API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://registration-landing-page-api.onrender.com
      - key: FRONTEND_URL
        value: https://as4696137.github.io/registration-landing-page
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: public
